services:
  # ==========================================
  # MySQL Database Service
  # ==========================================
  db:
    image: mysql:8.0
    container_name: crush-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: crush_root_pass
      MYSQL_DATABASE: crush_db
      MYSQL_USER: crush_user
      MYSQL_PASSWORD: crush_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - crush-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pcrush_root_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # PHP Backend Service (API)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: danig55/crush-backend:latest
    container_name: crush-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: crush_db
      DB_USER: crush_user
      DB_PASS: crush_pass
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_HOURS: 24
      CORS_ORIGIN: "*"
    ports:
      - "8080:80"
    volumes:
      - upload_data:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - crush-network

  # ==========================================
  # React Frontend Service (Nginx)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: danig55/crush-frontend:latest
    container_name: crush-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - crush-network

# ==========================================
# Named Volumes
# ==========================================
volumes:
  db_data:
    driver: local
  upload_data:
    driver: local

# ==========================================
# Custom Network
# ==========================================
networks:
  crush-network:
    driver: bridge
